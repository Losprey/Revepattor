<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e0d"/>
      <stop offset="100%" style="stop-color:#1a1a18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Round background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="none" stroke="url(#accent)" stroke-width="6" opacity=".3"/>
  <!-- Fork -->
  <g transform="translate(156, 120)">
    <rect x="12" y="0" width="12" height="160" rx="6" fill="url(#accent2)"/>
    <rect x="0" y="0" width="12" height="50" rx="6" fill="url(#accent2)"/>
    <rect x="24" y="0" width="12" height="50" rx="6" fill="url(#accent2)"/>
    <rect x="12" y="140" width="12" height="40" rx="6" fill="url(#accent)" transform="rotate(10, 18, 160)"/>
  </g>
  <!-- Knife -->
  <g transform="translate(300, 120)">
    <rect x="12" y="0" width="12" height="130" rx="6" fill="url(#accent2)"/>
    <path d="M18 0 Q0 20 0 50 L18 50 Z" fill="url(#accent2)"/>
    <rect x="12" y="110" width="12" height="70" rx="6" fill="url(#accent)" transform="rotate(-10, 18, 145)"/>
  </g>
  <!-- Plate curve hint -->
  <circle cx="256" cy="280" r="80" fill="none" stroke="url(#accent)" stroke-width="4" opacity=".15"/>
</svg>