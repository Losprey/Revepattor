<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-lang="appTitle">Receptár</title>
<style>
:root {
  --bg: #f8fafc; --surface: #fff; --text: #1e293b; --text2: #64748b;
  --border: #e2e8f0; --input-bg: #fff; --tag-bg: #fef3c7; --tag-text: #92400e;
  --primary: #e67e22; --primary-hover: #d35400; --danger: #ef4444; --success: #10b981;
  --cooking-bg: #1e293b; --cooking-text: #fff; --hover-bg: #f1f5f9;
  --modal-overlay: rgba(0,0,0,.45); --card-shadow: 0 1px 3px rgba(0,0,0,.08);
  --planner-bg: #f8fafc;
}
body.dark {
  --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; --text2: #94a3b8;
  --border: #334155; --input-bg: #1e293b; --tag-bg: #422006; --tag-text: #fbbf24;
  --primary: #f59e0b; --primary-hover: #d97706;
  --cooking-bg: #020617; --hover-bg: #334155;
  --modal-overlay: rgba(0,0,0,.75); --card-shadow: 0 1px 3px rgba(0,0,0,.3);
  --planner-bg: #1e293b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; transition: background .2s, color .2s; }
header { background: linear-gradient(135deg, var(--primary), #f39c12); color: #fff; padding: 1.25rem 2rem; text-align: center; position: relative; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: .5rem; }
header h1 { font-size: 1.6rem; }
header p { font-size: .9rem; opacity: .9; width:100%; }
.header-actions { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); display: flex; gap: .4rem; }
.topbar-btn { background: rgba(255,255,255,.2); border: none; color: #fff; padding: .35rem .65rem; border-radius: 6px; cursor: pointer; font-size: .8rem; backdrop-filter: blur(4px); }
.topbar-btn:hover { background: rgba(255,255,255,.35); }
.tabs { display: flex; background: var(--surface); border-bottom: 2px solid var(--border); }
.tab-btn { flex: 1; padding: .75rem .5rem; border: none; background: none; font-size: .85rem; font-weight: 600; cursor: pointer; color: var(--text2); transition: .15s; position: relative; }
.tab-btn:hover { color: var(--primary); }
.tab-btn.active { color: var(--primary); }
.tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 10%; right: 10%; height: 3px; background: var(--primary); border-radius: 3px; }
.container { max-width: 960px; margin: 0 auto; padding: 1rem; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.controls { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.controls input, .controls select { flex: 1; min-width: 130px; padding: .55rem .8rem; border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; background: var(--input-bg); color: var(--text); }
.btn { padding: .55rem 1rem; border: none; border-radius: 8px; font-size: .83rem; cursor: pointer; font-weight: 600; transition: .15s; display: inline-flex; align-items: center; gap: .35rem; white-space: nowrap; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--text2); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #059669; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; }
input, select, textarea { background: var(--input-bg); color: var(--text); border-color: var(--border); }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
.recipe-card { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: var(--card-shadow); transition: .2s; cursor: pointer; border: 1px solid var(--border); position: relative; }
.recipe-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.recipe-card .fav-btn { position: absolute; top: .5rem; right: .5rem; background: rgba(255,255,255,.85); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1.1rem; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.recipe-card .fav-btn:hover { transform: scale(1.15); }
.recipe-card-img { width: 100%; height: 140px; object-fit: cover; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--text2); }
.recipe-card-body { padding: .75rem; }
.recipe-card-body h3 { font-size: .95rem; }
.recipe-card-body .meta { font-size: .78rem; color: var(--text2); display: flex; gap: .5rem; flex-wrap: wrap; }
.recipe-card-body .stars { color: #f59e0b; font-size: .8rem; margin-top: .2rem; }
.recipe-card-body .tags { margin-top: .35rem; display: flex; flex-wrap: wrap; gap: .25rem; }
.tag { background: var(--tag-bg); color: var(--tag-text); padding: .1rem .45rem; border-radius: 20px; font-size: .68rem; font-weight: 500; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
.empty-state h3 { color: var(--text); }
.modal-overlay { display: none; position: fixed; inset: 0; background: var(--modal-overlay); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border-radius: 16px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.25rem; }
.modal h2 { margin-bottom: .75rem; font-size: 1.2rem; }
.form-group { margin-bottom: .8rem; }
.form-group label { display: block; font-weight: 600; margin-bottom: .2rem; font-size: .82rem; color: var(--text2); }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: .5rem .75rem; border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 55px; }
.form-row { display: flex; gap: .7rem; }
.form-row > * { flex: 1; }
.modal-footer { display: flex; gap: .5rem; justify-content: flex-end; flex-wrap: wrap; margin-top: .8rem; }
.detail-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin-bottom: .8rem; color: var(--text2); }
.detail-meta { display: flex; gap: .8rem; font-size: .85rem; color: var(--text2); margin-bottom: .6rem; flex-wrap: wrap; }
.detail-actions { display: flex; gap: .4rem; margin-bottom: .8rem; flex-wrap: wrap; }
.detail-section h3 { margin: .8rem 0 .35rem; font-size: 1rem; border-bottom: 2px solid var(--tag-bg); padding-bottom: .2rem; }
.detail-section ul, .detail-section ol { padding-left: 1.2rem; }
.detail-section li { margin-bottom: .25rem; }
.star-rating { display: inline-flex; gap: .2rem; font-size: 1.4rem; cursor: pointer; }
.star-rating .star { color: var(--border); transition: .1s; }
.star-rating .star.active { color: #f59e0b; }
.star-rating .star:hover { color: #f59e0b; transform: scale(1.15); }
.cooking-overlay { display: none; position: fixed; inset: 0; background: var(--cooking-bg); z-index: 2000; flex-direction: column; color: var(--cooking-text); padding: 1.25rem; }
.cooking-overlay.active { display: flex; }
.cooking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .8rem; flex-wrap: wrap; gap: .5rem; }
.cooking-header h2 { font-size: 1.2rem; }
.cooking-top-actions { display: flex; gap: .4rem; }
.cooking-timer { background: #334155; padding: .4rem .9rem; border-radius: 8px; font-size: 1.1rem; font-weight: 700; display: inline-flex; align-items: center; gap: .5rem; }
.cooking-timer.running { color: #f59e0b; }
.cooking-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 10px; margin-bottom: .8rem; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
.cooking-step-indicator { text-align: center; font-size: .85rem; color: #94a3b8; margin-bottom: .4rem; }
.cooking-step-text { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-align: center; padding: .8rem; cursor: pointer; line-height: 1.5; }
.cooking-nav { display: flex; justify-content: space-between; align-items: center; padding: .8rem 0; gap: .8rem; }
.cooking-nav button { background: #334155; color: #fff; border: none; padding: .7rem 1.3rem; border-radius: 10px; font-size: .95rem; cursor: pointer; font-weight: 600; }
.cooking-nav button:hover { background: #475569; }
.cooking-nav button:disabled { opacity: .3; cursor: not-allowed; }
.cooking-progress { height: 4px; background: #334155; border-radius: 4px; }
.cooking-progress-bar { height: 100%; background: var(--primary); border-radius: 4px; transition: width .3s; }
.planner-grid { display: grid; grid-template-columns: 95px repeat(3, 1fr); gap: 2px; background: var(--border); border-radius: 10px; overflow: hidden; }
.planner-header { background: var(--primary); color: #fff; padding: .5rem; text-align: center; font-weight: 600; font-size: .8rem; }
.planner-day { background: var(--surface); padding: .5rem; min-height: 60px; cursor: pointer; transition: .1s; }
.planner-day:hover { background: var(--tag-bg); }
.planner-day-label { background: var(--planner-bg); padding: .5rem; font-weight: 600; font-size: .8rem; color: var(--text); display: flex; align-items: center; }
.planner-recipe { font-size: .75rem; padding: .15rem .35rem; margin: .12rem 0; border-radius: 4px; background: var(--tag-bg); display: inline-block; }
.planner-empty { color: var(--text2); font-size: .75rem; }
.shop-recipes { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .8rem; }
.shop-recipe-tag { background: var(--border); padding: .35rem .8rem; border-radius: 20px; font-size: .82rem; cursor: pointer; font-weight: 500; transition: .15s; user-select: none; }
.shop-recipe-tag.selected { background: var(--primary); color: #fff; }
.shop-recipe-tag:hover { opacity: .8; }
.shop-list { list-style: none; }
.shop-list li { padding: .3rem .4rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .5rem; }
.shop-list li input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
.shop-list li.checked { text-decoration: line-through; color: var(--text2); }
.import-hidden { display: none; }
.fav-btn-active { color: #ef4444 !important; }
.nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; margin: .5rem 0; }
.nutrition-item { text-align: center; background: var(--border); border-radius: 8px; padding: .5rem .3rem; }
.nutrition-item .val { font-weight: 700; font-size: 1.1rem; }
.nutrition-item .lbl { font-size: .7rem; color: var(--text2); }
.ingredient-search-modal .ingr-list { max-height: 300px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: .35rem; padding: .5rem 0; }
.ingr-tag { background: var(--border); padding: .3rem .65rem; border-radius: 20px; font-size: .8rem; cursor: pointer; user-select: none; transition: .1s; }
.ingr-tag.selected { background: var(--primary); color: #fff; }
.ingr-match { font-size: .8rem; color: var(--text2); margin-top: .5rem; }
.voice-btn.listening { background: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
@media (max-width: 600px) {
  .recipe-grid { grid-template-columns: 1fr; }
  .planner-grid { grid-template-columns: 65px repeat(3, 1fr); font-size: .75rem; }
  .cooking-step-text { font-size: 1.2rem; }
  .controls input, .controls select { min-width: 90px; }
  .header-actions { position: static; transform: none; margin-top: .3rem; }
  header { flex-direction: column; }
}
@media print {
  .tabs,.controls,.modal-overlay,.cooking-overlay,.btn,.header-actions,.tabs,.topbar-btn { display: none !important; }
  .tab-content { display: block !important; }
  body { background: #fff; color: #000; }
  .recipe-card { break-inside: avoid; }
}
</style>
</head>
<body>

<header>
  <div style="text-align:center;">
    <h1>🍽️ <span data-lang="appTitle">Receptár</span></h1>
    <p data-lang="appSubtitle">Zbierka nápadov na varenie a pečenie</p>
  </div>
  <div class="header-actions">
    <button class="topbar-btn" onclick="toggleDark()" id="dark-toggle" title="Tmavý režim">🌙</button>
    <button class="topbar-btn" onclick="switchLang()" id="lang-toggle">🇬🇧 EN</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="recipes" data-lang="tabRecipes">📖 Recepty</button>
  <button class="tab-btn" data-tab="planner" data-lang="tabPlanner">📅 Plánovač</button>
  <button class="tab-btn" data-tab="shopping" data-lang="tabShopping">🛒 Nákupy</button>
</div>

<div class="container">
  <!-- RECIPES -->
  <div class="tab-content active" id="tab-recipes">
    <div class="controls">
      <input type="text" id="search" data-lang="searchPlaceholder" placeholder="Hľadať...">
      <select id="filter-category">
        <option value="" data-lang="allCategories">Všetky</option>
        <option>Hlavné jedlá</option><option>Polievky</option><option>Šaláty</option><option>Dezerty</option><option>Pečivo</option><option>Nápoje</option><option>Predjedlá</option><option>Raňajky</option><option>Prílohy</option>
      </select>
      <button class="btn btn-primary" onclick="openFormModal()" data-lang="btnAdd">+ Nový</button>
      <button class="btn btn-secondary" onclick="openIngredientSearch()" data-lang="btnByIngr">🥕 Suroviny</button>
      <button class="btn btn-secondary" onclick="randomRecipe()">🎲 <span data-lang="btnRandom">Náhodný</span></button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📥</button>
      <button class="btn btn-secondary" onclick="exportRecipes()">📤</button>
      <input type="file" id="import-file" class="import-hidden" accept=".json" onchange="importRecipes(event)">
    </div>
    <div class="recipe-grid" id="recipe-grid"></div>
  </div>

  <!-- PLANNER -->
  <div class="tab-content" id="tab-planner">
    <p style="margin-bottom:.6rem;color:var(--text2);" data-lang="plannerHint">Kliknutím na políčko pridáš recept.</p>
    <div class="planner-grid" id="planner-grid"></div>
    <div style="margin-top:.8rem;display:flex;gap:.5rem;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="clearPlanner()" data-lang="plannerClear">🗑 Vyčistiť</button>
      <button class="btn btn-success" onclick="generateShoppingFromPlanner()" data-lang="plannerShop">🛒 Zoznam z plánu</button>
    </div>
  </div>

  <!-- SHOPPING -->
  <div class="tab-content" id="tab-shopping">
    <p style="margin-bottom:.6rem;color:var(--text2);" data-lang="shopHint">Vyber recepty – suroviny sa spoja do zoznamu.</p>
    <div id="shop-recipe-select" class="shop-recipes"></div>
    <button class="btn btn-primary" onclick="generateShoppingList()" style="margin-bottom:.8rem;" data-lang="shopGenerate">🔄 Vygenerovať</button>
    <button class="btn btn-secondary" onclick="clearShoppingChecks()" style="margin-bottom:.8rem;" data-lang="shopReset">☑ Reset</button>
    <ul class="shop-list" id="shop-list"></ul>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <h2 data-lang="formTitle" id="form-title">Nový recept</h2>
    <div class="form-group"><label data-lang="formName">Názov</label><input id="r-name" data-lang="formNamePlace" placeholder="Názov"></div>
    <div class="form-group" id="name-en-group" style="display:none;"><label>Name (EN)</label><input id="r-nameEn" placeholder="Recipe name"></div>
    <div class="form-row">
      <div class="form-group">
        <label data-lang="formCategory">Kategória</label>
        <select id="r-category">
          <option>Hlavné jedlá</option><option>Polievky</option><option>Šaláty</option><option>Dezerty</option><option>Pečivo</option><option>Nápoje</option><option>Predjedlá</option><option>Raňajky</option><option>Prílohy</option>
        </select>
      </div>
      <div class="form-group"><label>⏱ <span data-lang="formTime">Čas (min)</span></label><input id="r-time" type="number" placeholder="30" min="1"></div>
    </div>
    <div class="form-group">
      <label>🖼 <span data-lang="formImage">Obrázok</span></label>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <input id="r-image" data-lang="formImagePlace" placeholder="URL" style="flex:1;">
        <input type="file" id="r-image-file" accept="image/*" style="display:none">
        <button class="btn btn-secondary" onclick="document.getElementById('r-image-file').click()" data-lang="formUpload">Nahrať</button>
      </div>
      <img id="r-image-preview" style="max-width:100px;max-height:75px;margin-top:.35rem;border-radius:6px;display:none;object-fit:cover;">
    </div>
    <div class="form-group">
      <label data-lang="formNutrition">Nutričné hodnoty (na porciu)</label>
      <div class="form-row">
        <div class="form-group"><label>🔥 kcal</label><input id="r-kcal" type="number" placeholder="350"></div>
        <div class="form-group"><label>💪 bielkoviny (g)</label><input id="r-protein" type="number" placeholder="20"></div>
        <div class="form-group"><label>🧈 tuky (g)</label><input id="r-fat" type="number" placeholder="15"></div>
        <div class="form-group"><label>🍚 sacharidy (g)</label><input id="r-carbs" type="number" placeholder="40"></div>
      </div>
    </div>
    <div class="form-group"><label data-lang="formIngredients">Suroviny (každá na nový riadok)</label><textarea id="r-ingredients" data-lang="formIngrPlace" placeholder="200g múky"></textarea></div>
    <div class="form-group"><label data-lang="formSteps">Postup (každý krok na nový riadok)</label><textarea id="r-steps" data-lang="formStepsPlace" placeholder="1. Zmiešajte..."></textarea></div>
    <div class="form-group"><label data-lang="formTags">Štítky (oddelené čiarkou)</label><input id="r-tags" data-lang="formTagsPlace" placeholder="rýchle, lacné"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('form-modal')" data-lang="cancel">Zrušiť</button>
      <button class="btn btn-primary" id="form-submit-btn" data-lang="save" onclick="saveRecipe()">Uložiť</button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div id="recipe-detail"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="openCookingMode()">👨‍🍳 <span data-lang="btnCook">Variť</span></button>
      <button class="btn btn-secondary" onclick="printRecipe()">🖨️ <span data-lang="btnPrint">Tlačiť</span></button>
      <button class="btn btn-secondary" onclick="shareRecipe()">📤 <span data-lang="btnShare">Zdieľať</span></button>
      <button class="btn btn-primary" onclick="editCurrent()">✏️ <span data-lang="btnEdit">Upraviť</span></button>
      <button class="btn btn-danger" onclick="deleteCurrent()">🗑 <span data-lang="btnDelete">Zmazať</span></button>
      <button class="btn btn-secondary" onclick="closeModal('detail-modal')" data-lang="close">Zavrieť</button>
    </div>
  </div>
</div>

<!-- COOKING -->
<div class="cooking-overlay" id="cooking-mode">
  <div class="cooking-header">
    <div class="cooking-top-actions">
      <button class="btn btn-secondary" onclick="closeCookingMode()" style="background:#475569;color:#fff;">✕ <span data-lang="cookingClose">Zavrieť</span></button>
      <button class="btn btn-secondary" id="voice-btn" onclick="toggleVoice()" style="background:#475569;color:#fff;">🎤</button>
    </div>
    <h2 id="cooking-title"></h2>
    <div class="cooking-timer" id="cooking-timer" onclick="toggleTimer()">⏱️ 00:00</div>
  </div>
  <div id="cooking-img" class="cooking-img">🍽️</div>
  <div class="cooking-step-indicator" id="cooking-step-indicator"></div>
  <div class="cooking-step-text" id="cooking-step-text" onclick="cookingNext()"></div>
  <div class="cooking-progress"><div class="cooking-progress-bar" id="cooking-progress-bar"></div></div>
  <div class="cooking-nav">
    <button id="cooking-prev" onclick="cookingPrev()">← <span data-lang="cookingPrev">Predošlý</span></button>
    <span id="cooking-step-count"></span>
    <button id="cooking-next" onclick="cookingNext()"><span data-lang="cookingNext">Ďalší</span> →</button>
  </div>
</div>

<!-- PLANNER PICK -->
<div class="modal-overlay" id="planner-pick-modal">
  <div class="modal">
    <h2 id="planner-pick-title">Vyber recept</h2>
    <input type="text" id="planner-pick-search" data-lang="searchPlaceholder" placeholder="Hľadať..." oninput="renderPlannerPick()">
    <div id="planner-pick-list" style="max-height:300px;overflow-y:auto;margin:.8rem 0;"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="planner-remove-btn" onclick="plannerRemove()" style="display:none;" data-lang="plannerRemove">Odstrániť</button>
      <button class="btn btn-secondary" onclick="closeModal('planner-pick-modal')" data-lang="cancel">Zrušiť</button>
    </div>
  </div>
</div>

<!-- INGREDIENT SEARCH -->
<div class="modal-overlay" id="ingredient-modal">
  <div class="modal">
    <h2 data-lang="ingrTitle">🔍 Čo máš doma?</h2>
    <p style="color:var(--text2);margin-bottom:.5rem;" data-lang="ingrHint">Označ suroviny, ktoré máš – zobrazia sa recepty, čo z nich uvaríš.</p>
    <input type="text" id="ingr-search" data-lang="ingrFilter" placeholder="Filtrovať suroviny..." oninput="renderIngredientSearch()" style="width:100%;padding:.5rem .8rem;border:1px solid var(--border);border-radius:8px;font-size:.85rem;margin-bottom:.5rem;background:var(--input-bg);color:var(--text);">
    <div class="ingr-list" id="ingr-list"></div>
    <div class="ingr-match" id="ingr-match"></div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;">
      <button class="btn btn-secondary" onclick="clearIngredientSearch()" data-lang="ingrClear">Vyčistiť</button>

let mealPlan = JSON.parse(localStorage.getItem('mealPlan') || '{}');
let editingId = null, viewingId = null;
let cookingStep = 0, cookingRecipeId = null, cookingTimer = null, cookingTimerRunning = false, cookingTimerSeconds = 0;
let plannerPickDay = '', plannerPickMeal = '';
let shopChecked = new Set(JSON.parse(localStorage.getItem('shopChecked') || '[]'));
let voiceRecognition = null, voiceListening = false;
let ingredientSearchSelected = new Set();

// ======================== LANGUAGE ========================
function t(key) { return (LANG[lang] && LANG[lang][key]) || LANG.sk[key] || key; }

function applyLang() {
  document.documentElement.lang = lang === 'en' ? 'en' : 'sk';
  document.querySelectorAll('[data-lang]').forEach(el => {
    const key = el.dataset.lang;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      if (el.placeholder) el.placeholder = t(key);
    } else {
      // preserve leading emoji/icons
      const txt = t(key);
      if (el.children.length === 0 || (el.children.length === 1 && el.querySelector('span'))) {
        el.textContent = txt;
      } else {
        // Set text on text nodes only or last child
        const spans = el.querySelectorAll('span');
        if (spans.length === 1 && spans[0].dataset.lang) {
          spans[0].textContent = txt.replace(/^[^\w]*\s*/,'');
        }
      }
    }
  });
  document.getElementById('lang-toggle').textContent = lang === 'en' ? '🇸🇰 SK' : '🇬🇧 EN';
  // Show/hide English name field in form
  document.getElementById('name-en-group').style.display = lang === 'en' ? 'block' : 'none';
  // Update form title
  if (editingId !== null) {
    document.getElementById('form-title').textContent = t('formTitle') + ' (edit)';
  } else {
    document.getElementById('form-title').textContent = t('formTitle');
  }
  // Re-render
  renderPlanner();
  generateShoppingList();
}

function switchLang() {
  lang = lang === 'en' ? 'sk' : 'en';
  localStorage.setItem('lang', lang);
  applyLang();
  render();
}

// ======================== THEME ========================
function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('dark', document.body.classList.contains('dark') ? '1' : '');
  document.getElementById('dark-toggle').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
}
if (localStorage.getItem('dark')) { document.body.classList.add('dark'); document.getElementById('dark-toggle').textContent = '☀️'; }

// ======================== PERSISTENCE ========================
function saveToLS() {
  localStorage.setItem('recipes', JSON.stringify(recipes));
  localStorage.setItem('mealPlan', JSON.stringify(mealPlan));
  localStorage.setItem('shopChecked', JSON.stringify([...shopChecked]));
}

// ======================== RECIPES TAB ========================
function render() {
  const grid = document.getElementById('recipe-grid');
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-category').value;
  const showFav = document.getElementById('filter-fav')?.checked;
  let filtered = recipes.filter(r => {
    const name = lang === 'en' && r.nameEn ? r.nameEn : r.name;
    const tags = lang === 'en' && r.tagsEn ? r.tagsEn : r.tags;
    const matchSearch = name.toLowerCase().includes(search) || tags.some(t => t.toLowerCase().includes(search));
    const matchCat = !cat || r.category === cat;
    const matchFav = !showFav || r.favorite;
    return matchSearch && matchCat && matchFav;
  });
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>😕 ${t('noRecipes')}</h3><p>${t('noRecipesHint')}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(r => {
    const name = lang === 'en' && r.nameEn ? r.nameEn : r.name;
    const tags = lang === 'en' && r.tagsEn ? r.tagsEn : r.tags;
    return `<div class="recipe-card">
      <button class="fav-btn" onclick="event.stopPropagation();toggleFav(${r.id})">${r.favorite ? '❤️' : '🤍'}</button>
      ${r.image || r.imageData
        ? `<img class="recipe-card-img" src="${r.imageData || r.image}" alt="${name}" onerror="this.outerHTML='<div class=\\'recipe-card-img\\'>🍽️</div>'">`
        : `<div class="recipe-card-img">🍽️</div>`}
      <div class="recipe-card-body" onclick="viewRecipe(${r.id})">
        <h3>${name}</h3>
        <div class="meta"><span>📂 ${r.category}</span><span>⏱ ${r.time} ${lang==='en'?'min':'min'}</span></div>
        ${r.rating > 0 ? `<div class="stars">${'★'.repeat(Math.round(r.rating))}${'☆'.repeat(5-Math.round(r.rating))}</div>` : ''}
        ${r.nutrition ? `<div class="meta">🔥 ${r.nutrition.kcal || '?'} kcal</div>` : ''}
        <div class="tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
  renderShopRecipes();
  updateFavFilter();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-category').addEventListener('change', render);

function toggleFav(id) {
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  r.favorite = !r.favorite;
  saveToLS();
  render();
}

function updateFavFilter() {
  let el = document.getElementById('filter-fav');
  if (!el) {
    const controls = document.querySelector('#tab-recipes .controls');
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:flex;align-items:center;gap:.3rem;font-size:.82rem;white-space:nowrap;color:var(--text2);cursor:pointer;';
    lbl.innerHTML = `<input type="checkbox" id="filter-fav" onchange="render()"> ❤️`;
    controls.appendChild(lbl);
    el = document.getElementById('filter-fav');
  }
}

// ======================== RANDOM ========================
function randomRecipe() {
  if (!recipes.length) return;
  const r = recipes[Math.floor(Math.random() * recipes.length)];
  viewRecipe(r.id);
}

// ======================== MODALS ========================
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); renderPlanner(); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) { el.classList.remove('active'); renderPlanner(); } });
});

// ======================== FORM ========================
function openFormModal(recipe) {
  editingId = recipe ? recipe.id : null;
  document.getElementById('form-title').textContent = recipe ? t('formTitle') + ' (edit)' : t('formTitle');
  document.getElementById('form-submit-btn').textContent = recipe ? t('save') : t('btnAdd');
  document.getElementById('r-name').value = recipe ? recipe.name : '';
  document.getElementById('r-nameEn').value = recipe && recipe.nameEn ? recipe.nameEn : '';
  document.getElementById('r-category').value = recipe ? recipe.category : 'Hlavné jedlá';
  document.getElementById('r-time').value = recipe ? recipe.time : '';
  document.getElementById('r-image').value = recipe && recipe.image && !recipe.imageData ? recipe.image : '';
  document.getElementById('r-ingredients').value = recipe ? recipe.ingredients.join('\n') : '';
  document.getElementById('r-steps').value = recipe ? recipe.steps.join('\n') : '';
  document.getElementById('r-tags').value = recipe ? recipe.tags.join(', ') : '';
  document.getElementById('r-kcal').value = recipe && recipe.nutrition ? recipe.nutrition.kcal || '' : '';
  document.getElementById('r-protein').value = recipe && recipe.nutrition ? recipe.nutrition.protein || '' : '';
  document.getElementById('r-fat').value = recipe && recipe.nutrition ? recipe.nutrition.fat || '' : '';
  document.getElementById('r-carbs').value = recipe && recipe.nutrition ? recipe.nutrition.carbs || '' : '';
  document.getElementById('r-image-preview').style.display = 'none';
  if (recipe && recipe.imageData) {
    document.getElementById('r-image-preview').src = recipe.imageData;
    document.getElementById('r-image-preview').style.display = 'block';
  }
  openModal('form-modal');
}

document.getElementById('r-image-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const preview = document.getElementById('r-image-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('r-image').value = '';
  };
  reader.readAsDataURL(file);
});

function saveRecipe() {
  const name = document.getElementById('r-name').value.trim();
  const nameEn = document.getElementById('r-nameEn').value.trim() || '';
  const category = document.getElementById('r-category').value;
  const time = parseInt(document.getElementById('r-time').value) || 0;
  const image = document.getElementById('r-image').value.trim();
  const imageData = document.getElementById('r-image-preview').src && document.getElementById('r-image-preview').style.display !== 'none'
    ? (document.getElementById('r-image-preview').src.startsWith('data:') ? document.getElementById('r-image-preview').src : '') : '';
  const ingredients = document.getElementById('r-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean);
  const steps = document.getElementById('r-steps').value.split('\n').map(s => s.trim()).filter(Boolean);
  const tags = document.getElementById('r-tags').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
  const kcal = parseInt(document.getElementById('r-kcal').value) || 0;
  const protein = parseInt(document.getElementById('r-protein').value) || 0;
  const fat = parseInt(document.getElementById('r-fat').value) || 0;
  const carbs = parseInt(document.getElementById('r-carbs').value) || 0;
  if (!name) return alert(t('formName') + ' je povinný.');
  if (!ingredients.length) return alert(t('formIngredients') + ' je povinná.');
  if (!steps.length) return alert(t('formSteps') + ' je povinný.');
  const nutrition = {kcal,protein,fat,carbs};
  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx !== -1) recipes[idx] = {...recipes[idx], name, nameEn, category, time, image, imageData, ingredients, steps, tags, nutrition};
    editingId = null;
  } else {
    recipes.push({id:Date.now(), name, nameEn, category, time, image, imageData, ingredients, steps, tags, rating:0, notes:'', notesEn:'', favorite:false, nutrition});
  }
  saveToLS();
  closeModal('form-modal');
  render();
}

// ======================== DETAIL ========================
function viewRecipe(id) {
  viewingId = id;
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  const name = lang === 'en' && r.nameEn ? r.nameEn : r.name;
  const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
  const stps = lang === 'en' && r.stepsEn ? r.stepsEn : r.steps;
  const tgs = lang === 'en' && r.tagsEn ? r.tagsEn : r.tags;
  const n = r.nutrition;
  const el = document.getElementById('recipe-detail');
  el.innerHTML = `
    ${r.image || r.imageData ? `<img class="detail-img" src="${r.imageData||r.image}" onerror="this.outerHTML='<div class=\\'detail-img\\'>🍽️</div>'">` : `<div class="detail-img">🍽️</div>`}
    <h2>${name} <span style="font-size:.85rem;color:var(--text2);font-weight:400;">(⏱ ${r.time} ${lang==='en'?'min':'min'})</span></h2>
    <div class="detail-meta"><span>📂 ${r.category}</span><span>🏷 ${tgs.join(', ')}</span></div>
    <div class="detail-section">
      <h3>⭐ ${t('formTitle') === 'New Recipe' ? 'Rating' : 'Hodnotenie'}</h3>
      <div class="star-rating">${[1,2,3,4,5].map(i => `<span class="star ${i<=Math.round(r.rating)?'active':''}" onclick="setRating(${id},${i})">★</span>`).join('')}</div>
    </div>
    ${n && (n.kcal||n.protein||n.fat||n.carbs) ? `<div class="detail-section"><h3>🥗 ${t('recipeNutri')} (${t('perPortion')})</h3>
      <div class="nutrition-grid">
        <div class="nutrition-item"><div class="val">🔥 ${n.kcal||'?'}</div><div class="lbl">${t('kcal')}</div></div>
        <div class="nutrition-item"><div class="val">💪 ${n.protein||'?'}g</div><div class="lbl">${t('protein')}</div></div>
        <div class="nutrition-item"><div class="val">🧈 ${n.fat||'?'}g</div><div class="lbl">${t('fat')}</div></div>
        <div class="nutrition-item"><div class="val">🍚 ${n.carbs||'?'}g</div><div class="lbl">${t('carbs')}</div></div>
      </div></div>` : ''}
    <div class="detail-section"><h3>🥕 ${t('formIngredients')}</h3><ul>${ingr.map(i=>`<li>${i}</li>`).join('')}</ul></div>
    <div class="detail-section"><h3>📝 ${t('formSteps')}</h3><ol>${stps.map(s=>`<li>${s}</li>`).join('')}</ol></div>
    <div class="detail-section"><h3>📓 ${t('formTitle')==='New Recipe'?'Notes':'Poznámky'}</h3>
      <textarea id="recipe-notes" style="width:100%;padding:.5rem;border:1px solid var(--border);border-radius:8px;min-height:55px;font-family:inherit;font-size:.85rem;background:var(--input-bg);color:var(--text);" onchange="saveNotes(${id},this.value)">${(lang==='en'&&r.notesEn?r.notesEn:r.notes)||''}</textarea></div>
  `;
  openModal('detail-modal');
}

function setRating(id, val) {
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  r.rating = r.rating === val ? 0 : val;
  saveToLS();
  viewRecipe(id);
  render();
}

function saveNotes(id, val) {
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  if (lang === 'en') r.notesEn = val;
  else r.notes = val;
  saveToLS();
}

function editCurrent() {
  const r = recipes.find(rec => rec.id === viewingId);
  if (!r) return;
  closeModal('detail-modal');
  openFormModal(r);
}

function deleteCurrent() {
  if (!confirm(t('deleteConfirm'))) return;
  recipes = recipes.filter(r => r.id !== viewingId);
  Object.keys(mealPlan).forEach(k => { Object.keys(mealPlan[k]).forEach(m => { if (mealPlan[k][m] === viewingId) delete mealPlan[k][m]; }); });
  saveToLS();
  closeModal('detail-modal');
  render();
  renderPlanner();
}

// ======================== PRINT ========================
function printRecipe() {
  const r = recipes.find(rec => rec.id === viewingId);
  if (!r) return;
  const name = lang === 'en' && r.nameEn ? r.nameEn : r.name;
  const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
  const stps = lang === 'en' && r.stepsEn ? r.stepsEn : r.steps;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>${name}</title><style>
    body{font-family:system-ui,sans-serif;padding:2rem;max-width:700px;margin:0 auto;color:#1e293b;}
    h1{font-size:1.8rem;} .meta{color:#64748b;} h2{border-bottom:2px solid #fef3c7;padding-bottom:.3rem;margin-top:1.5rem;}
    ul,ol{padding-left:1.25rem;} li{margin-bottom:.3rem;}
    @media print{body{padding:0;}}
  </style></head><body>
    <h1>🍽️ ${name}</h1>
    <p class="meta">⏱ ${r.time} min | 📂 ${r.category}${r.nutrition&&r.nutrition.kcal ? ' | 🔥 '+r.nutrition.kcal+' kcal' : ''}</p>
    <h2>🥕 Ingredients / Suroviny</h2><ul>${ingr.map(i=>`<li>${i}</li>`).join('')}</ul>
    <h2>📝 Steps / Postup</h2><ol>${stps.map(s=>`<li>${s}</li>`).join('')}</ol>
    <script>window.print();window.close();<\/script>
  </body></html>`);
  win.document.close();
}

// ======================== SHARE ========================
function shareRecipe() {
  const r = recipes.find(rec => rec.id === viewingId);
  if (!r) return;
  const name = lang === 'en' && r.nameEn ? r.nameEn : r.name;
  const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
  const stps = lang === 'en' && r.stepsEn ? r.stepsEn : r.steps;
  const tgs = lang === 'en' && r.tagsEn ? r.tagsEn : r.tags;
  const text = `🍽️ ${name}\n⏱ ${r.time} min | 📂 ${r.category}\n\n🥕 ${t('formIngredients')}:\n${ingr.map(i=>`• ${i}`).join('\n')}\n\n📝 ${t('formSteps')}:\n${stps.map((s,j)=>`${j+1}. ${s}`).join('\n')}\n\n🏷 ${tgs.join(', ')}`;
  // Use Web Share API if available
  if (navigator.share) {
    navigator.share({title: name, text: text}).catch(() => {});
  } else {
    // Fallback: show share options
    const a = document.createElement('div');
    a.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--surface);padding:1rem;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:3000;display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--border);';
    a.innerHTML = `
      <button class="btn btn-secondary" onclick="copyText(\`${text.replace(/`/g,'\\`')}\`)">📋 Copy</button>
      <button class="btn btn-secondary" onclick="window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(\`${text.replace(/`/g,'\\`')}\`),'_blank')">📱 ${t('shareWhatsApp')}</button>
      <button class="btn btn-secondary" onclick="window.open('https://www.facebook.com/sharer/sharer.php?quote='+encodeURIComponent(\`${text.replace(/`/g,'\\`')}\`),'_blank')">💬 ${t('shareMessenger')}</button>
      <button class="btn btn-secondary" onclick="window.location.href='mailto:?subject='+encodeURIComponent('${name}')+'&body='+encodeURIComponent(\`${text.replace(/`/g,'\\`')}\`)">✉️ ${t('shareEmail')}</button>
      <button class="btn btn-primary" onclick="this.parentElement.remove()">✕</button>
    `;
    document.body.appendChild(a);
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => alert('Copied!')).catch(() => prompt('Copy:', text));
}

// ======================== EXPORT/IMPORT ========================
function exportRecipes() {
  const blob = new Blob([JSON.stringify(recipes.map(r => ({...r, imageData: ''})), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `receptar-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importRecipes(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data) || !data.length || !data[0].name) throw new Error('bad');
      if (confirm(`${t('importConfirm')} ${data.length} receptov?`)) {
        data.forEach(imp => {
          const idx = recipes.findIndex(r => r.id === imp.id);
          if (idx !== -1) recipes[idx] = imp;
          else recipes.push(imp);
        });
        saveToLS();
        render(); renderPlanner(); renderShopRecipes();
        alert(`${t('importOk')} ${data.length}.`);
      }
    } catch(err) { alert(t('exportError')); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ======================== COOKING MODE ========================
function openCookingMode() {
  cookingRecipeId = viewingId;
  cookingStep = 0;
  const r = recipes.find(rec => rec.id === cookingRecipeId);
  if (!r) return;
  closeModal('detail-modal');
  document.getElementById('cooking-mode').classList.add('active');
  renderCookingStep();
}

function renderCookingStep() {
  const r = recipes.find(rec => rec.id === cookingRecipeId);
  if (!r) return;
  const total = r.steps.length;
  const name = lang === 'en' && r.nameEn ? r.nameEn : r.name;
  const stps = lang === 'en' && r.stepsEn ? r.stepsEn : r.steps;
  document.getElementById('cooking-title').textContent = name;
  const imgEl = document.getElementById('cooking-img');
  if (r.image || r.imageData) {
    imgEl.innerHTML = `<img src="${r.imageData||r.image}" style="width:100%;height:100%;object-fit:contain;" onerror="this.outerHTML='🍽️'">`;
  } else { imgEl.textContent = '🍽️'; }
  document.getElementById('cooking-step-indicator').textContent = `${lang==='en'?'Step':'Krok'} ${cookingStep+1}/${total}`;
  document.getElementById('cooking-step-text').textContent = stps[cookingStep];
  document.getElementById('cooking-step-count').textContent = `${cookingStep+1}/${total}`;
  document.getElementById('cooking-progress-bar').style.width = `${((cookingStep+1)/total)*100}%`;
  document.getElementById('cooking-prev').disabled = cookingStep === 0;
  document.getElementById('cooking-next').innerHTML = cookingStep === total-1 ? `✓ ${lang==='en'?'Done':'Hotovo'}` : `${lang==='en'?'Next':'Ďalší'} →`;
}

function cookingNext() {
  const r = recipes.find(rec => rec.id === cookingRecipeId);
  if (!r) return;
  if (cookingStep < r.steps.length - 1) { cookingStep++; renderCookingStep(); }
  else { closeCookingMode(); alert(t('cookingDone')); }
}
function cookingPrev() { if (cookingStep > 0) { cookingStep--; renderCookingStep(); } }

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('cooking-mode').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); cookingNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); cookingPrev(); }
  if (e.key === 'Escape') { closeCookingMode(); }
});

function closeCookingMode() {
  document.getElementById('cooking-mode').classList.remove('active');
  stopTimer();
  stopVoice();
}

// ======================== TIMER ========================
function toggleTimer() {
  if (cookingTimerRunning) { stopTimer(); }
  else {
    const mins = prompt(lang==='en'?'Timer (minutes):' : 'Timer (minúty):', '5');
    if (mins === null) return;
    cookingTimerSeconds = parseInt(mins) * 60 || 300;
    startTimer();
  }
}

function startTimer() {
  cookingTimerRunning = true;
  document.getElementById('cooking-timer').classList.add('running');
  updateTimerDisplay();
  cookingTimer = setInterval(() => {
    cookingTimerSeconds--;
    if (cookingTimerSeconds <= 0) { stopTimer(); alert('⏰ ' + (lang==='en'?'Time\'s up!':'Timer dobehol!')); }
    else updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  cookingTimerRunning = false;
  document.getElementById('cooking-timer').classList.remove('running');
  if (cookingTimer) { clearInterval(cookingTimer); cookingTimer = null; }
  document.getElementById('cooking-timer').textContent = '⏱️ 00:00';
}

function updateTimerDisplay() {
  const m = Math.floor(cookingTimerSeconds / 60);
  const s = cookingTimerSeconds % 60;
  document.getElementById('cooking-timer').textContent = `⏱️ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (cookingTimerSeconds <= 60) document.getElementById('cooking-timer').style.color = '#ef4444';
  else document.getElementById('cooking-timer').style.color = '';
}

// ======================== VOICE ========================
function toggleVoice() {
  if (voiceListening) { stopVoice(); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert(lang==='en'?'Voice control not supported in this browser.' : 'Hlasové ovládanie nie je podporované v tomto prehliadači.'); return; }
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = lang === 'en' ? 'en-US' : 'sk-SK';
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = false;
  voiceRecognition.onresult = function(e) {
    const txt = e.results[e.results.length-1][0].transcript.toLowerCase();
    if (txt.includes('next') || txt.includes('ďalší') || txt.includes('dalej') || txt.includes('hotovo') || txt.includes('done')) cookingNext();
    if (txt.includes('previous') || txt.includes('predošlý') || txt.includes('späť') || txt.includes('back')) cookingPrev();
    if (txt.includes('close') || txt.includes('zavrieť') || txt.includes('koniec') || txt.includes('exit')) closeCookingMode();
    if (txt.includes('timer') || txt.includes('časovač')) toggleTimer();
    if (txt.includes('stop') || txt.includes('halt')) stopTimer();
  };
  voiceRecognition.onerror = function() { stopVoice(); };
  voiceRecognition.start();
  voiceListening = true;
  document.getElementById('voice-btn').classList.add('listening');
  document.getElementById('voice-btn').textContent = '🎤🔴';
}

function stopVoice() {
  if (voiceRecognition) { try { voiceRecognition.stop(); } catch(e) {} voiceRecognition = null; }
  voiceListening = false;
  document.getElementById('voice-btn').classList.remove('listening');
  document.getElementById('voice-btn').textContent = '🎤';
}

// ======================== PLANNER ========================
const DAYS = ['Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota','Nedeľa'];
const DAYS_EN = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MEALS = ['Raňajky','Obed','Večera'];
const MEALS_EN = ['Breakfast','Lunch','Dinner'];

function getDays() { return lang === 'en' ? DAYS_EN : DAYS; }
function getMeals() { return lang === 'en' ? MEALS_EN : MEALS; }

function renderPlanner() {
  const grid = document.getElementById('planner-grid');
  const days = getDays();
  const meals = getMeals();
  let html = `<div class="planner-header">${lang==='en'?'Day':'Deň'}</div>${meals.map(m=>`<div class="planner-header">${m}</div>`).join('')}`;
  days.forEach((day, di) => {
    const dayKey = DAYS[di];
    html += `<div class="planner-day-label">${day}</div>`;
    meals.forEach((meal, mi) => {
      const mealKey = MEALS[mi];
      const key = `${dayKey}-${mealKey}`;
      const rid = mealPlan[key];
      const r = rid ? recipes.find(rec => rec.id === rid) : null;
      html += `<div class="planner-day" onclick="openPlannerPick('${dayKey}','${mealKey}')">`;
      if (r) {
        const n = lang==='en' && r.nameEn ? r.nameEn : r.name;
        html += `<div class="planner-recipe">${n}</div>`;
      } else { html += `<span class="planner-empty">+</span>`; }
      html += `</div>`;
    });
  });
  grid.innerHTML = html;
}

function openPlannerPick(day, meal) {
  plannerPickDay = day; plannerPickMeal = meal;
  const key = `${day}-${meal}`;
  const rid = mealPlan[key];
  const days = getDays(); const meals = getMeals();
  const di = DAYS.indexOf(day); const mi = MEALS.indexOf(meal);
  document.getElementById('planner-pick-title').textContent = `${days[di]} – ${meals[mi]}`;
  document.getElementById('planner-pick-search').value = '';
  document.getElementById('planner-remove-btn').style.display = rid ? 'inline-flex' : 'none';
  renderPlannerPick();
  openModal('planner-pick-modal');
}

function renderPlannerPick() {
  const search = document.getElementById('planner-pick-search').value.toLowerCase();
  const list = document.getElementById('planner-pick-list');
  const filtered = recipes.filter(r => {
    const n = lang === 'en' && r.nameEn ? r.nameEn : r.name;
    return n.toLowerCase().includes(search);
  });
  if (!filtered.length) { list.innerHTML = `<p style="color:var(--text2);">—</p>`; return; }
  list.innerHTML = filtered.map(r => {
    const n = lang === 'en' && r.nameEn ? r.nameEn : r.name;
    return `<div style="padding:.45rem;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:.5rem;"
         onmouseenter="this.style.background='var(--hover-bg)'" onmouseleave="this.style.background=''"
         onclick="plannerSelect(${r.id})">
      ${r.image||r.imageData ? `<img src="${r.imageData||r.image}" style="width:36px;height:28px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'">` : '<span style="font-size:1.2rem;">🍽️</span>'}
      <span>${n}</span>
    </div>`;
  }).join('');
}

function plannerSelect(id) {
  const key = `${plannerPickDay}-${plannerPickMeal}`;
  mealPlan[key] = id;
  saveToLS();
  closeModal('planner-pick-modal');
  renderPlanner();
}

function plannerRemove() {
  const key = `${plannerPickDay}-${plannerPickMeal}`;
  delete mealPlan[key];
  saveToLS();
  closeModal('planner-pick-modal');
  renderPlanner();
}

function clearPlanner() {
  if (!confirm(t('plannerClearConfirm'))) return;
  mealPlan = {};
  saveToLS();
  renderPlanner();
}

// ======================== SHOPPING ========================
function renderShopRecipes() {
  const el = document.getElementById('shop-recipe-select');
  el.innerHTML = recipes.map(r => {
    const n = lang==='en' && r.nameEn ? r.nameEn : r.name;
    return `<span class="shop-recipe-tag ${shopChecked.has(r.id)?'selected':''}" onclick="toggleShopRecipe(${r.id})">${n}</span>`;
  }).join('');
}

function toggleShopRecipe(id) {
  if (shopChecked.has(id)) shopChecked.delete(id);
  else shopChecked.add(id);
  saveToLS();
  renderShopRecipes();
  generateShoppingList();
}

function generateShoppingFromPlanner() {
  const ids = new Set(Object.values(mealPlan).filter(Boolean));
  if (!ids.size) return alert(t('plannerEmpty'));
  shopChecked = ids;
  saveToLS();
  switchTab('shopping');
  renderShopRecipes();
  generateShoppingList();
}

function generateShoppingList() {
  const el = document.getElementById('shop-list');
  const all = [];
  shopChecked.forEach(id => {
    const r = recipes.find(rec => rec.id === id);
    if (r) {
      const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
      ingr.forEach(i => all.push(i));
    }
  });
  if (!all.length) { el.innerHTML = `<li style="color:var(--text2);padding:.8rem;">—</li>`; return; }
  const counts = {};
  all.forEach(i => { const k = i.toLowerCase().replace(/^\d+[gml]\s*/,'').trim(); counts[k] = counts[k]||{text:i,count:0}; counts[k].count++; });
  el.innerHTML = Object.values(counts).map(c =>
    `<li><input type="checkbox"><span>${c.text}${c.count>1?` <span style="color:var(--text2);font-size:.78rem;">(×${c.count})</span>`:''}</span></li>`
  ).join('');
  el.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() { this.closest('li').classList.toggle('checked', this.checked); });
  });
}

function clearShoppingChecks() {
  shopChecked.clear();
  saveToLS();
  renderShopRecipes();
  document.getElementById('shop-list').innerHTML = `<li style="color:var(--text2);padding:.8rem;">—</li>`;
}

// ======================== INGREDIENT SEARCH ========================
function openIngredientSearch() {
  const allIngrs = [...new Set(recipes.flatMap(r => {
    const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
    return ingr;
  }))].sort();
  document.getElementById('ingredient-modal').dataset.all = JSON.stringify(allIngrs);
  renderIngredientSearch();
  openModal('ingredient-modal');
}

function renderIngredientSearch() {
  const all = JSON.parse(document.getElementById('ingredient-modal').dataset.all || '[]');
  const filter = document.getElementById('ingr-search').value.toLowerCase();
  const visible = filter ? all.filter(i => i.toLowerCase().includes(filter)) : all;
  const list = document.getElementById('ingr-list');
  list.innerHTML = visible.map(i =>
    `<span class="ingr-tag ${ingredientSearchSelected.has(i)?'selected':''}" onclick="toggleIngrSearch('${i.replace(/'/g,"\\'")}')">${i}</span>`
  ).join('');
  // Show match count
  const matchEl = document.getElementById('ingr-match');
  if (ingredientSearchSelected.size === 0) { matchEl.innerHTML = ''; return; }
  const sel = [...ingredientSearchSelected];
  const fullMatch = recipes.filter(r => {
    const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
    return sel.every(s => ingr.some(i => i.toLowerCase().includes(s.toLowerCase())));
  });
  const partialMatch = recipes.filter(r => {
    const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
    return !fullMatch.includes(r) && sel.some(s => ingr.some(i => i.toLowerCase().includes(s.toLowerCase())));
  });
  let html = '';
  if (fullMatch.length) html += `<div style="color:var(--success);">✅ ${fullMatch.length} ${t('matchCount')}</div>`;
  else html += `<div style="color:var(--danger);">❌ ${t('noMatch')}</div>`;
  if (partialMatch.length) html += `<div style="color:var(--text2);">⚠️ ${partialMatch.length} ${t('matchPart')}</div>`;
  matchEl.innerHTML = html;
}

function toggleIngrSearch(ingr) {
  if (ingredientSearchSelected.has(ingr)) ingredientSearchSelected.delete(ingr);
  else ingredientSearchSelected.add(ingr);
  renderIngredientSearch();
}

function clearIngredientSearch() { ingredientSearchSelected.clear(); renderIngredientSearch(); }

// Close ingredient modal -> update recipe grid
document.getElementById('ingredient-modal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal('ingredient-modal');
    if (ingredientSearchSelected.size > 0) {
      // Filter grid by selected ingredients
      const sel = [...ingredientSearchSelected];
      const matching = recipes.filter(r => {
        const ingr = lang === 'en' && r.ingredientsEn ? r.ingredientsEn : r.ingredients;
        return sel.some(s => ingr.some(i => i.toLowerCase().includes(s.toLowerCase())));
      });
      // Temporarily override grid
      const grid = document.getElementById('recipe-grid');
      if (!matching.length) { grid.innerHTML = `<div class="empty-state"><h3>😕 ${t('noRecipes')}</h3></div>`; return; }
      grid.innerHTML = matching.map(r => {
        const name = lang==='en'&&r.nameEn?r.nameEn:r.name;
        const tags = lang==='en'&&r.tagsEn?r.tagsEn:r.tags;
        return `<div class="recipe-card"><button class="fav-btn" onclick="event.stopPropagation();toggleFav(${r.id})">${r.favorite?'❤️':'🤍'}</button>
          ${r.image||r.imageData?`<img class="recipe-card-img" src="${r.imageData||r.image}" onerror="this.outerHTML='<div class=\\'recipe-card-img\\'>🍽️</div>'">`:`<div class="recipe-card-img">🍽️</div>`}
          <div class="recipe-card-body" onclick="viewRecipe(${r.id})"><h3>${name}</h3>
          <div class="meta"><span>📂 ${r.category}</span><span>⏱ ${r.time} min</span></div>
          <div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div></div>`;
      }).join('');
    }
  }
});

// ======================== TABS ========================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
  if (name === 'planner') renderPlanner();
  if (name === 'shopping') { renderShopRecipes(); generateShoppingList(); }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ======================== INIT ========================
applyLang();
render();
renderPlanner();
</script>
