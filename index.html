<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receptár</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.6; }
header { background: linear-gradient(135deg, #e67e22, #f39c12); color: #fff; padding: 2rem; text-align: center; }
header h1 { font-size: 2rem; }
header p { opacity: .9; }
.container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.controls { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.controls input, .controls select { flex: 1; min-width: 180px; padding: .65rem 1rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: .95rem; }
.btn { padding: .65rem 1.25rem; border: none; border-radius: 8px; font-size: .95rem; cursor: pointer; font-weight: 600; transition: .15s; }
.btn-primary { background: #e67e22; color: #fff; }
.btn-primary:hover { background: #d35400; }
.btn-secondary { background: #e2e8f0; color: #1e293b; }
.btn-secondary:hover { background: #cbd5e1; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
.recipe-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: .2s; cursor: pointer; border: 1px solid #e2e8f0; }
.recipe-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.recipe-card-img { width: 100%; height: 160px; object-fit: cover; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #94a3b8; }
.recipe-card-body { padding: 1rem; }
.recipe-card-body h3 { font-size: 1.05rem; margin-bottom: .25rem; }
.recipe-card-body .meta { font-size: .85rem; color: #64748b; display: flex; gap: .75rem; }
.recipe-card-body .tags { margin-top: .5rem; display: flex; flex-wrap: wrap; gap: .35rem; }
.tag { background: #fef3c7; color: #92400e; padding: .15rem .55rem; border-radius: 20px; font-size: .75rem; font-weight: 500; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
.modal h2 { margin-bottom: 1rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-weight: 600; margin-bottom: .3rem; font-size: .9rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: .6rem .85rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: .9rem; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-row { display: flex; gap: .75rem; }
.form-row > * { flex: 1; }
.modal-footer { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1rem; }
#recipe-detail .detail-img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #94a3b8; margin-bottom: 1rem; }
#recipe-detail .detail-meta { display: flex; gap: 1rem; font-size: .9rem; color: #64748b; margin-bottom: 1rem; }
#recipe-detail h3 { margin: 1rem 0 .5rem; font-size: 1.1rem; }
#recipe-detail ul, #recipe-detail ol { padding-left: 1.25rem; margin-bottom: 1rem; }
#recipe-detail li { margin-bottom: .3rem; }
.empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
.empty-state h3 { font-size: 1.2rem; margin-bottom: .5rem; color: #64748b; }
@media (max-width: 600px) { .recipe-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>🍽️ Receptár</h1>
  <p>Zbierka nápadov na varenie a pečenie</p>
</header>

<div class="container">
  <div class="controls">
    <input type="text" id="search" placeholder="Hľadať recept...">
    <select id="filter-category">
      <option value="">Všetky kategórie</option>
      <option value="Hlavné jedlá">Hlavné jedlá</option>
      <option value="Polievky">Polievky</option>
      <option value="Šaláty">Šaláty</option>
      <option value="Dezerty">Dezerty</option>
      <option value="Pečivo">Pečivo</option>
      <option value="Nápoje">Nápoje</option>
      <option value="Predjedlá">Predjedlá</option>
      <option value="Raňajky">Raňajky</option>
    </select>
    <button class="btn btn-primary" onclick="openModal('add')">+ Nový recept</button>
  </div>

  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <h2 id="form-title">Nový recept</h2>
    <div class="form-group">
      <label>Názov</label>
      <input id="r-name" placeholder="Názov receptu">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Kategória</label>
        <select id="r-category">
          <option>Hlavné jedlá</option><option>Polievky</option><option>Šaláty</option><option>Dezerty</option><option>Pečivo</option><option>Nápoje</option><option>Predjedlá</option><option>Raňajky</option>
        </select>
      </div>
      <div class="form-group">
        <label>⏱ Čas (min)</label>
        <input id="r-time" type="number" placeholder="30" min="1">
      </div>
    </div>
    <div class="form-group">
      <label>🖼 URL obrázka (voliteľné)</label>
      <input id="r-image" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Suroviny (každá na nový riadok)</label>
      <textarea id="r-ingredients" placeholder="200g múky&#10;2 vajcia&#10;100ml mlieka"></textarea>
    </div>
    <div class="form-group">
      <label>Postup (každý krok na nový riadok)</label>
      <textarea id="r-steps" placeholder="1. Zmiešajte suché suroviny&#10;2. Pridajte vajcia a mlieko&#10;3. Pečte 20 minút"></textarea>
    </div>
    <div class="form-group">
      <label>Štítky (oddelené čiarkou)</label>
      <input id="r-tags" placeholder="rýchle, lacné, vegetariánske">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('form-modal')">Zrušiť</button>
      <button class="btn btn-primary" id="form-submit-btn" onclick="saveRecipe()">Uložiť</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div id="recipe-detail"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="detail-edit-btn" onclick="editCurrent()">Upraviť</button>
      <button class="btn btn-danger" onclick="deleteCurrent()">Zmazať</button>
      <button class="btn btn-secondary" onclick="closeModal('detail-modal')">Zavrieť</button>
    </div>
  </div>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem('recipes') || 'null') || [
  { id: 1, name: 'Cestoviny aglio e olio', category: 'Hlavné jedlá', time: 20, image: '', ingredients: ['200g špagiet', '4 strúčiky cesnaku', '5 lyžíc olivového oleja', '1 čili paprička', 'soľ', 'petržlenová vňať'], steps: ['Dajte variť osolenú vodu a uvarte cestoviny al dente.', 'Na panvici zohrejte olivový olej a pridajte na tenké plátky nakrájaný cesnak a čili.', 'Keď cesnak začne zlatnúť, pridajte uvarené cestoviny.', 'Dôkladne premiešajte, ozdobte petržlenom a podávajte.'], tags: ['rýchle', 'taliančina'] },
  { id: 2, name: 'Mrkvová polievka', category: 'Polievky', time: 35, image: '', ingredients: ['500g mrkvy', '1 cibuľa', '1 zemiak', '2 strúčiky cesnaku', '1l zeleninového vývaru', 'smotana na ozdobenie', 'soľ, korenie, rasca'], steps: ['Mrkvu, zemiak a cibuľu ošúpte a nakrájajte na kocky.', 'Na troche oleja opečte cibuľu a cesnak, pridajte mrkvu a zemiak.', 'Zalejte vývarom a varte 20 minút do zmäknutia.', 'Rozmixujte do hladka, dochuťte soľou, korením a rascou.', 'Podávajte s kvapkou smotany.'], tags: ['zdravé', 'jednoduché'] },
  { id: 3, name: 'Čokoládový fondant', category: 'Dezerty', time: 25, image: '', ingredients: ['200g horkej čokolády', '100g masla', '2 vajcia', '2 žĺtky', '80g cukru', '40g hladkej múky'], steps: ['Rúru predhrejte na 200°C a vymastite 4 formičky.', 'Vo vodnom kúpeli roztopte čokoládu s maslom.', 'Vyšľahajte vajcia, žĺtky a cukor do peny.', 'Jemne vmiešajte čokoládovú zmes a múku.', 'Rozdeľte do formičiek a pečte 10-12 minút.', 'Vnútri by mal byť tekutý – podávajte ihneď.'], tags: ['dezert', 'čokoláda'] },
  { id: 4, name: 'Cézar šalát', category: 'Šaláty', time: 15, image: '', ingredients: ['1 hlávka rímskeho šalátu', '2 kuracie prsia', '50g parmezánu', 'krutóny', 'dressing: 3 lyžice olivového oleja, 1 lyžica citrónu, 1 strúčik cesnaku, 1 čajová lyžička horčice, soľ, korenie'], steps: ['Kuracie prsia osoľte, okoreňte a opečte na panvici dozlatista.', 'Šalát natrhajte na menšie kúsky.', 'Pripravte dressing zmiešaním všetkých ingrediencií.', 'Zmiešajte šalát s dressingom, pridajte nakrájané kura, krutóny a parmezán.'], tags: ['rýchle', 'zdravé', 'šalát'] },
  { id: 5, name: 'Lievance s jahodami', category: 'Raňajky', time: 25, image: '', ingredients: ['250g hladkej múky', '2 vajcia', '300ml mlieka', '1 prášok do pečiva', '2 lyžice cukru', 'štipka soli', 'maslo na pečenie', 'jahody na ozdobenie'], steps: ['Zmiešajte múku, prášok do pečiva, cukor a soľ.', 'V druhej miske rozšľahajte vajcia s mliekom.', 'Spojte suché a mokré ingrediencie a vymiešajte hladké cesto.', 'Na panvici roztopte trochu masla a lyžicou dávkujte cesto.', 'Opekajte z oboch strán dozlatista.', 'Podávajte s čerstvými jahodami a javorovým sirupom.'], tags: ['raňajky', 'sladké'] },
];

let editingId = null;
let viewingId = null;

function saveToLS() { localStorage.setItem('recipes', JSON.stringify(recipes)); }

function render() {
  const grid = document.getElementById('recipe-grid');
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-category').value;

  let filtered = recipes.filter(r =>
    (r.name.toLowerCase().includes(search) || r.tags.some(t => t.toLowerCase().includes(search))) &&
    (!cat || r.category === cat)
  );

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>😕 Žiadne recepty</h3><p>Skúste iný filter alebo pridajte nový recept.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" onclick="viewRecipe(${r.id})">
      ${r.image
        ? `<img class="recipe-card-img" src="${r.image}" alt="${r.name}" onerror="this.src='';this.onerror=null">`
        : `<div class="recipe-card-img">🍽️</div>`}
      <div class="recipe-card-body">
        <h3>${r.name}</h3>
        <div class="meta"><span>📂 ${r.category}</span><span>⏱ ${r.time} min</span></div>
        <div class="tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function openModal(type, id) {
  if (type === 'add') {
    editingId = null;
    document.getElementById('form-title').textContent = 'Nový recept';
    document.getElementById('form-submit-btn').textContent = 'Pridať';
    ['r-name','r-image','r-tags','r-ingredients','r-steps'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('r-category').value = 'Hlavné jedlá';
    document.getElementById('r-time').value = '';
  }
  document.getElementById('form-modal').classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function saveRecipe() {
  const name = document.getElementById('r-name').value.trim();
  const category = document.getElementById('r-category').value;
  const time = parseInt(document.getElementById('r-time').value) || 0;
  const image = document.getElementById('r-image').value.trim();
  const ingredients = document.getElementById('r-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean);
  const steps = document.getElementById('r-steps').value.split('\n').map(s => s.trim()).filter(Boolean);
  const tags = document.getElementById('r-tags').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

  if (!name) return alert('Zadajte názov receptu.');
  if (!ingredients.length) return alert('Zadajte aspoň jednu surovinu.');
  if (!steps.length) return alert('Zadajte aspoň jeden krok postupu.');

  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx !== -1) { recipes[idx] = { ...recipes[idx], name, category, time, image, ingredients, steps, tags }; }
    editingId = null;
  } else {
    recipes.push({ id: Date.now(), name, category, time, image, ingredients, steps, tags });
  }
  saveToLS();
  closeModal('form-modal');
  render();
}

function viewRecipe(id) {
  viewingId = id;
  const r = recipes.find(r => r.id === id);
  if (!r) return;

  const el = document.getElementById('recipe-detail');
  el.innerHTML = `
    ${r.image
      ? `<img class="detail-img" src="${r.image}" alt="${r.name}" onerror="this.src='';this.onerror=null">`
      : `<div class="detail-img">🍽️</div>`}
    <h2>${r.name}</h2>
    <div class="detail-meta">
      <span>📂 ${r.category}</span>
      <span>⏱ ${r.time} min</span>
      <span>🏷 ${r.tags.join(', ')}</span>
    </div>
    <h3>Suroviny</h3>
    <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
    <h3>Postup</h3>
    <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
  `;
  document.getElementById('detail-modal').classList.add('active');
}

function editCurrent() {
  const r = recipes.find(r => r.id === viewingId);
  if (!r) return;
  editingId = r.id;
  document.getElementById('form-title').textContent = 'Upraviť recept';
  document.getElementById('form-submit-btn').textContent = 'Uložiť zmeny';
  document.getElementById('r-name').value = r.name;
  document.getElementById('r-category').value = r.category;
  document.getElementById('r-time').value = r.time;
  document.getElementById('r-image').value = r.image;
  document.getElementById('r-ingredients').value = r.ingredients.join('\n');
  document.getElementById('r-steps').value = r.steps.join('\n');
  document.getElementById('r-tags').value = r.tags.join(', ');
  closeModal('detail-modal');
  document.getElementById('form-modal').classList.add('active');
}

function deleteCurrent() {
  if (!confirm('Naozaj chcete zmazať tento recept?')) return;
  recipes = recipes.filter(r => r.id !== viewingId);
  saveToLS();
  closeModal('detail-modal');
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-category').addEventListener('change', render);
document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => {
  if (e.target === el) { el.classList.remove('active'); render(); }
}));

render();
</script>
</body>
</html>
