<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receptár</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.6; }
header { background: linear-gradient(135deg, #e67e22, #f39c12); color: #fff; padding: 1.5rem 2rem; text-align: center; position: relative; }
header h1 { font-size: 1.8rem; }
header p { opacity: .9; font-size: .95rem; }
.tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #e2e8f0; }
.tab-btn { flex: 1; padding: .85rem; border: none; background: none; font-size: .9rem; font-weight: 600; cursor: pointer; color: #64748b; transition: .15s; position: relative; }
.tab-btn:hover { color: #e67e22; }
.tab-btn.active { color: #e67e22; }
.tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 10%; right: 10%; height: 3px; background: #e67e22; border-radius: 3px; }
.container { max-width: 960px; margin: 0 auto; padding: 1rem; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Controls */
.controls { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.controls input, .controls select { flex: 1; min-width: 150px; padding: .6rem .85rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: .9rem; }
.btn { padding: .6rem 1.1rem; border: none; border-radius: 8px; font-size: .88rem; cursor: pointer; font-weight: 600; transition: .15s; display: inline-flex; align-items: center; gap: .4rem; white-space: nowrap; }
.btn-primary { background: #e67e22; color: #fff; }
.btn-primary:hover { background: #d35400; }
.btn-secondary { background: #e2e8f0; color: #1e293b; }
.btn-secondary:hover { background: #cbd5e1; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }

/* Recipe Grid */
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
.recipe-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); transition: .2s; cursor: pointer; border: 1px solid #e2e8f0; }
.recipe-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.recipe-card-img { width: 100%; height: 150px; object-fit: cover; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; color: #94a3b8; }
.recipe-card-body { padding: .85rem; }
.recipe-card-body h3 { font-size: 1rem; margin-bottom: .2rem; }
.recipe-card-body .meta { font-size: .82rem; color: #64748b; display: flex; gap: .6rem; flex-wrap: wrap; }
.recipe-card-body .stars { color: #f59e0b; font-size: .85rem; margin-top: .25rem; }
.recipe-card-body .tags { margin-top: .4rem; display: flex; flex-wrap: wrap; gap: .3rem; }
.tag { background: #fef3c7; color: #92400e; padding: .1rem .5rem; border-radius: 20px; font-size: .7rem; font-weight: 500; }

/* Empty state */
.empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
.empty-state h3 { font-size: 1.1rem; color: #64748b; }
.empty-state .btn { margin-top: .75rem; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; max-width: 620px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
.modal h2 { margin-bottom: 1rem; font-size: 1.3rem; }
.form-group { margin-bottom: .9rem; }
.form-group label { display: block; font-weight: 600; margin-bottom: .25rem; font-size: .85rem; color: #475569; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: .55rem .8rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: .88rem; font-family: inherit; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: .75rem; }
.form-row > * { flex: 1; }
.modal-footer { display: flex; gap: .6rem; justify-content: flex-end; flex-wrap: wrap; margin-top: 1rem; }

/* Detail modal */
.detail-img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #94a3b8; margin-bottom: 1rem; }
.detail-meta { display: flex; gap: 1rem; font-size: .88rem; color: #64748b; margin-bottom: .75rem; flex-wrap: wrap; }
.detail-actions { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.detail-section h3 { margin: 1rem 0 .4rem; font-size: 1.05rem; border-bottom: 2px solid #fef3c7; padding-bottom: .25rem; }
.detail-section ul, .detail-section ol { padding-left: 1.25rem; margin-bottom: .5rem; }
.detail-section li { margin-bottom: .3rem; }

/* Star rating */
.star-rating { display: inline-flex; gap: .25rem; font-size: 1.5rem; cursor: pointer; }
.star-rating .star { color: #d1d5db; transition: .1s; }
.star-rating .star.active { color: #f59e0b; }
.star-rating .star:hover { color: #f59e0b; transform: scale(1.15); }

/* Cooking mode */
.cooking-overlay { display: none; position: fixed; inset: 0; background: #1e293b; z-index: 2000; flex-direction: column; color: #fff; padding: 1.5rem; }
.cooking-overlay.active { display: flex; }
.cooking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.cooking-header h2 { font-size: 1.3rem; }
.cooking-step-indicator { text-align: center; font-size: .9rem; color: #94a3b8; margin-bottom: .5rem; }
.cooking-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; margin-bottom: 1rem; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
.cooking-step-text { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; text-align: center; padding: 1rem; cursor: pointer; line-height: 1.5; }
.cooking-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; gap: 1rem; }
.cooking-nav button { background: #334155; color: #fff; border: none; padding: .8rem 1.5rem; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: 600; }
.cooking-nav button:hover { background: #475569; }
.cooking-nav button:disabled { opacity: .3; cursor: not-allowed; }
.cooking-progress { height: 4px; background: #334155; border-radius: 4px; margin-top: .5rem; }
.cooking-progress-bar { height: 100%; background: #e67e22; border-radius: 4px; transition: width .3s; }

/* Planner */
.planner-grid { display: grid; grid-template-columns: 100px repeat(3, 1fr); gap: 2px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
.planner-header { background: #e67e22; color: #fff; padding: .6rem; text-align: center; font-weight: 600; font-size: .85rem; }
.planner-day { background: #fff; padding: .6rem; min-height: 70px; cursor: pointer; transition: .1s; }
.planner-day:hover { background: #fef3c7; }
.planner-day-label { background: #f8fafc; padding: .6rem; font-weight: 600; font-size: .85rem; color: #475569; display: flex; align-items: center; }
.planner-recipe { font-size: .78rem; padding: .2rem .4rem; margin: .15rem 0; border-radius: 4px; background: #fef3c7; display: inline-block; }
.planner-recipe:hover { background: #fde68a; }
.planner-empty { color: #94a3b8; font-size: .78rem; }

/* Shopping list */
.shop-recipes { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
.shop-recipe-tag { background: #e2e8f0; padding: .4rem .85rem; border-radius: 20px; font-size: .85rem; cursor: pointer; font-weight: 500; transition: .15s; user-select: none; }
.shop-recipe-tag.selected { background: #e67e22; color: #fff; }
.shop-recipe-tag:hover { background: #cbd5e1; }
.shop-recipe-tag.selected:hover { background: #d35400; }
.shop-list { list-style: none; }
.shop-list li { padding: .35rem .5rem; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: .5rem; }
.shop-list li input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.shop-list li.checked { text-decoration: line-through; color: #94a3b8; }

/* Import */
.import-hidden { display: none; }

/* Responsive */
@media (max-width: 600px) {
  .recipe-grid { grid-template-columns: 1fr; }
  .planner-grid { grid-template-columns: 70px repeat(3, 1fr); font-size: .8rem; }
  .cooking-step-text { font-size: 1.2rem; }
  .controls input, .controls select { min-width: 100px; }
}
</style>
</head>
<body>

<header>
  <h1>🍽️ Receptár</h1>
  <p>Zbierka nápadov na varenie a pečenie</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="recipes">📖 Recepty</button>
  <button class="tab-btn" data-tab="planner">📅 Plánovač</button>
  <button class="tab-btn" data-tab="shopping">🛒 Nákupy</button>
</div>

<div class="container">
  <!-- RECIPES TAB -->
  <div class="tab-content active" id="tab-recipes">
    <div class="controls">
      <input type="text" id="search" placeholder="Hľadať recept...">
      <select id="filter-category">
        <option value="">Všetky kategórie</option>
        <option>Hlavné jedlá</option><option>Polievky</option><option>Šaláty</option><option>Dezerty</option><option>Pečivo</option><option>Nápoje</option><option>Predjedlá</option><option>Raňajky</option>
      </select>
      <button class="btn btn-primary" onclick="openFormModal()">+ Nový</button>
      <button class="btn btn-secondary" onclick="randomRecipe()">🎲 Náhodný</button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📥 Import</button>
      <button class="btn btn-secondary" onclick="exportRecipes()">📤 Export</button>
      <input type="file" id="import-file" class="import-hidden" accept=".json" onchange="importRecipes(event)">
    </div>
    <div class="recipe-grid" id="recipe-grid"></div>
  </div>

  <!-- PLANNER TAB -->
  <div class="tab-content" id="tab-planner">
    <p style="margin-bottom:.75rem;color:#64748b;">Kliknutím na políčko pridáš recept na daný deň a jedlo.</p>
    <div class="planner-grid" id="planner-grid"></div>
    <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="clearPlanner()">🗑 Vyčistiť plán</button>
      <button class="btn btn-success" onclick="generateShoppingFromPlanner()">🛒 Nákupný zoznam z plánu</button>
    </div>
  </div>

  <!-- SHOPPING TAB -->
  <div class="tab-content" id="tab-shopping">
    <p style="margin-bottom:.75rem;color:#64748b;">Vyber recepty – suroviny sa spoja do nákupného zoznamu.</p>
    <div id="shop-recipe-select" class="shop-recipes"></div>
    <button class="btn btn-primary" onclick="generateShoppingList()" style="margin-bottom:1rem;">🔄 Vygenerovať zoznam</button>
    <button class="btn btn-secondary" onclick="clearShoppingChecks()" style="margin-bottom:1rem;">☑ Reset</button>
    <ul class="shop-list" id="shop-list"></ul>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <h2 id="form-title">Nový recept</h2>
    <div class="form-group">
      <label>Názov</label>
      <input id="r-name" placeholder="Názov receptu">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Kategória</label>
        <select id="r-category">
          <option>Hlavné jedlá</option><option>Polievky</option><option>Šaláty</option><option>Dezerty</option><option>Pečivo</option><option>Nápoje</option><option>Predjedlá</option><option>Raňajky</option>
        </select>
      </div>
      <div class="form-group">
        <label>⏱ Čas (min)</label>
        <input id="r-time" type="number" placeholder="30" min="1">
      </div>
    </div>
    <div class="form-group">
      <label>🖼 Obrázok</label>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <input id="r-image" placeholder="alebo URL obrázka" style="flex:1;">
        <input type="file" id="r-image-file" accept="image/*" style="display:none">
        <button class="btn btn-secondary" onclick="document.getElementById('r-image-file').click()">Nahrať</button>
      </div>
      <img id="r-image-preview" style="max-width:120px;max-height:90px;margin-top:.4rem;border-radius:6px;display:none;object-fit:cover;">
    </div>
    <div class="form-group">
      <label>Suroviny (každá na nový riadok)</label>
      <textarea id="r-ingredients" placeholder="200g múky&#10;2 vajcia&#10;100ml mlieka"></textarea>
    </div>
    <div class="form-group">
      <label>Postup (každý krok na nový riadok)</label>
      <textarea id="r-steps" placeholder="1. Zmiešajte suché suroviny&#10;2. Pridajte vajcia a mlieko&#10;3. Pečte 20 minút"></textarea>
    </div>
    <div class="form-group">
      <label>Štítky (oddelené čiarkou)</label>
      <input id="r-tags" placeholder="rýchle, lacné, vegetariánske">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('form-modal')">Zrušiť</button>
      <button class="btn btn-primary" id="form-submit-btn" onclick="saveRecipe()">Uložiť</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div id="recipe-detail"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="openCookingMode()">👨‍🍳 Variť</button>
      <button class="btn btn-secondary" onclick="shareRecipe()">📤 Zdieľať</button>
      <button class="btn btn-primary" onclick="editCurrent()">✏ Upraviť</button>
      <button class="btn btn-danger" onclick="deleteCurrent()">🗑 Zmazať</button>
      <button class="btn btn-secondary" onclick="closeModal('detail-modal')">Zavrieť</button>
    </div>
  </div>
</div>

<!-- COOKING MODE -->
<div class="cooking-overlay" id="cooking-mode">
  <div class="cooking-header">
    <button class="btn btn-secondary" onclick="closeCookingMode()" style="background:#475569;color:#fff;">✕ Zavrieť</button>
    <h2 id="cooking-title"></h2>
    <div></div>
  </div>
  <div id="cooking-img" class="cooking-img">🍽️</div>
  <div class="cooking-step-indicator" id="cooking-step-indicator"></div>
  <div class="cooking-step-text" id="cooking-step-text" onclick="cookingNext()"></div>
  <div class="cooking-progress"><div class="cooking-progress-bar" id="cooking-progress-bar"></div></div>
  <div class="cooking-nav">
    <button id="cooking-prev" onclick="cookingPrev()">← Predošlý</button>
    <span id="cooking-step-count"></span>
    <button id="cooking-next" onclick="cookingNext()">Ďalší →</button>
  </div>
</div>

<!-- PLANNER PICK MODAL -->
<div class="modal-overlay" id="planner-pick-modal">
  <div class="modal">
    <h2 id="planner-pick-title">Vyber recept</h2>
    <input type="text" id="planner-pick-search" placeholder="Hľadať..." oninput="renderPlannerPick()">
    <div id="planner-pick-list" style="max-height:300px;overflow-y:auto;margin:1rem 0;"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="planner-remove-btn" onclick="plannerRemove()" style="display:none;">Odstrániť</button>
      <button class="btn btn-secondary" onclick="closeModal('planner-pick-modal')">Zrušiť</button>
    </div>
  </div>
</div>

<script>
// ============= DATA =============
const DEFAULT_RECIPES = [
  { id: 1, name: 'Špagety aglio e olio', category: 'Hlavné jedlá', time: 20, image: '', imageData: '', ingredients: ['200g špagiet','4 strúčiky cesnaku','5 lyžíc olivového oleja','1 čili paprička','soľ','petržlenová vňať'], steps: ['Dajte variť osolenú vodu a uvarte cestoviny al dente.','Na panvici zohrejte olivový olej a pridajte na tenké plátky nakrájaný cesnak a čili.','Keď cesnak začne zlatnúť, pridajte uvarené cestoviny a premiešajte.','Ozdobte petržlenom a podávajte.'], tags: ['rýchle','taliančina'], rating: 0, notes: '' },
  { id: 2, name: 'Mrkvová polievka', category: 'Polievky', time: 35, image: '', imageData: '', ingredients: ['500g mrkvy','1 cibuľa','1 zemiak','2 strúčiky cesnaku','1l zeleninového vývaru','smotana na ozdobenie','soľ, korenie, rasca'], steps: ['Mrkvu, zemiak a cibuľu ošúpte a nakrájajte na kocky.','Na troche oleja opečte cibuľu a cesnak, pridajte mrkvu a zemiak.','Zalejte vývarom a varte 20 minút do zmäknutia.','Rozmixujte do hladka, dochuťte soľou, korením a rascou.','Podávajte s kvapkou smotany.'], tags: ['zdravé','jednoduché'], rating: 0, notes: '' },
  { id: 3, name: 'Čokoládový fondant', category: 'Dezerty', time: 25, image: '', imageData: '', ingredients: ['200g horkej čokolády','100g masla','2 vajcia','2 žĺtky','80g cukru','40g hladkej múky'], steps: ['Rúru predhrejte na 200°C a vymastite 4 formičky.','Vo vodnom kúpeli roztopte čokoládu s maslom.','Vyšľahajte vajcia, žĺtky a cukor do peny.','Jemne vmiešajte čokoládovú zmes a múku.','Rozdeľte do formičiek a pečte 10-12 minút.','Vnútri by mal byť tekutý – podávajte ihneď.'], tags: ['dezert','čokoláda'], rating: 0, notes: '' },
  { id: 4, name: 'Cézar šalát', category: 'Šaláty', time: 15, image: '', imageData: '', ingredients: ['1 hlávka rímskeho šalátu','2 kuracie prsia','50g parmezánu','krutóny','3 lyžice olivového oleja','1 lyžica citrónu','1 strúčik cesnaku','1ČL horčice','soľ, korenie'], steps: ['Kuracie prsia osoľte, okoreňte a opečte dozlatista.','Šalát natrhajte na menšie kúsky.','Zmiešajte olej, citrón, cesnak, horčicu, soľ a korenie – dressing.','Zmiešajte šalát s dressingom, pridajte kura, krutóny a parmezán.'], tags: ['rýchle','zdravé','šalát'], rating: 0, notes: '' },
  { id: 5, name: 'Lievance s jahodami', category: 'Raňajky', time: 25, image: '', imageData: '', ingredients: ['250g hladkej múky','2 vajcia','300ml mlieka','1 prášok do pečiva','2 lyžice cukru','štipka soli','maslo na pečenie','jahody na ozdobenie'], steps: ['Zmiešajte múku, prášok do pečiva, cukor a soľ.','V druhej miske rozšľahajte vajcia s mliekom.','Spojte suché a mokré ingrediencie a vymiešajte hladké cesto.','Na panvici roztopte maslo a lyžicou dávkujte cesto.','Opekajte z oboch strán dozlatista.','Podávajte s jahodami a javorovým sirupom.'], tags: ['raňajky','sladké'], rating: 0, notes: '' },
  { id: 6, name: 'Bryndzové halušky', category: 'Hlavné jedlá', time: 40, image: '', imageData: '', ingredients: ['500g zemiakov','250g hladkej múky','1 vajce','soľ','250g bryndze','100g slaniny','kyslá smotana'], steps: ['Zemiaky ošúpte a nastrúhajte najemno.','Zmiešajte s múkou, vajcom a soľou na cesto.','Cesto pretláčajte cez sitko do vriacej osolenej vody.','Halušky vyberte keď vyplávajú na povrch.','Slaninu nakrájajte a opečte do chrumkava.','Zmiešajte halušky s bryndzou, posypte slaninou a ozdobte smotanou.'], tags: ['slovenské','tradičné'], rating: 0, notes: '' },
  { id: 7, name: 'Kuracie prsia na smotane', category: 'Hlavné jedlá', time: 30, image: '', imageData: '', ingredients: ['2 kuracie prsia','1 cibuľa','200ml smotany na varenie','1ČL horčice','soľ, korenie','olej','kôpor na ozdobenie'], steps: ['Kuracie prsia nakrájajte na plátky, osoľte a okoreňte.','Opečte z oboch strán dozlatista a vyberte.','Na výpeku opečte cibuľu dosklovita, pridajte horčicu.','Zalejte smotanou, vráťte kura a duste 10 minút.','Ozdobte kôprom a podávajte s ryžou.'], tags: ['rýchle','smotanové'], rating: 0, notes: '' },

let recipes = JSON.parse(localStorage.getItem('recipes') || 'null') || [...DEFAULT_RECIPES.map(r => ({...r}))];
let mealPlan = JSON.parse(localStorage.getItem('mealPlan') || '{}');
let editingId = null;
let viewingId = null;
let cookingStep = 0;
let cookingRecipeId = null;
let plannerPickDay = '';
let plannerPickMeal = '';
let shopChecked = new Set();

// ============= PERSISTENCE =============
function saveToLS() {
  localStorage.setItem('recipes', JSON.stringify(recipes));
  localStorage.setItem('mealPlan', JSON.stringify(mealPlan));
}

// ============= RECIPES TAB =============
function render() {
  const grid = document.getElementById('recipe-grid');
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-category').value;
  let filtered = recipes.filter(r =>
    (r.name.toLowerCase().includes(search) || r.tags.some(t => t.toLowerCase().includes(search))) &&
    (!cat || r.category === cat)
  );
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>😕 Žiadne recepty</h3><p>Skúste iný filter alebo pridajte nový recept.</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" onclick="viewRecipe(${r.id})">
      ${r.image || r.imageData
        ? `<img class="recipe-card-img" src="${r.imageData || r.image}" alt="${r.name}" onerror="this.src='';this.onerror=null">`
        : `<div class="recipe-card-img">🍽️</div>`}
      <div class="recipe-card-body">
        <h3>${r.name}</h3>
        <div class="meta"><span>📂 ${r.category}</span><span>⏱ ${r.time} min</span></div>
        ${r.rating > 0 ? `<div class="stars">${'★'.repeat(Math.round(r.rating))}${'☆'.repeat(5-Math.round(r.rating))}</div>` : ''}
        <div class="tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
  renderShopRecipes();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-category').addEventListener('change', render);

// ============= RANDOM RECIPE =============
function randomRecipe() {
  if (!recipes.length) return;
  const r = recipes[Math.floor(Math.random() * recipes.length)];
  viewRecipe(r.id);
}

// ============= MODALS =============
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) { el.classList.remove('active'); renderPlanner(); } });
});

// ============= FORM =============
function openFormModal(recipe) {
  editingId = recipe ? recipe.id : null;
  document.getElementById('form-title').textContent = recipe ? 'Upraviť recept' : 'Nový recept';
  document.getElementById('form-submit-btn').textContent = recipe ? 'Uložiť zmeny' : 'Pridať';
  document.getElementById('r-name').value = recipe ? recipe.name : '';
  document.getElementById('r-category').value = recipe ? recipe.category : 'Hlavné jedlá';
  document.getElementById('r-time').value = recipe ? recipe.time : '';
  document.getElementById('r-image').value = recipe && recipe.image && !recipe.imageData ? recipe.image : '';
  document.getElementById('r-ingredients').value = recipe ? recipe.ingredients.join('\n') : '';
  document.getElementById('r-steps').value = recipe ? recipe.steps.join('\n') : '';
  document.getElementById('r-tags').value = recipe ? recipe.tags.join(', ') : '';
  document.getElementById('r-image-preview').style.display = 'none';
  if (recipe && recipe.imageData) {
    document.getElementById('r-image-preview').src = recipe.imageData;
    document.getElementById('r-image-preview').style.display = 'block';
  }
  openModal('form-modal');
}

document.getElementById('r-image-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const preview = document.getElementById('r-image-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('r-image').value = '';
  };
  reader.readAsDataURL(file);
});

function saveRecipe() {
  const name = document.getElementById('r-name').value.trim();
  const category = document.getElementById('r-category').value;
  const time = parseInt(document.getElementById('r-time').value) || 0;
  const image = document.getElementById('r-image').value.trim();
  const imageData = document.getElementById('r-image-preview').src && document.getElementById('r-image-preview').style.display !== 'none'
    ? (document.getElementById('r-image-preview').src.startsWith('data:') ? document.getElementById('r-image-preview').src : '')
    : '';
  const ingredients = document.getElementById('r-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean);
  const steps = document.getElementById('r-steps').value.split('\n').map(s => s.trim()).filter(Boolean);
  const tags = document.getElementById('r-tags').value.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
  if (!name) return alert('Zadajte názov receptu.');
  if (!ingredients.length) return alert('Zadajte aspoň jednu surovinu.');
  if (!steps.length) return alert('Zadajte aspoň jeden krok postupu.');
  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx !== -1) recipes[idx] = { ...recipes[idx], name, category, time, image, imageData, ingredients, steps, tags };
    editingId = null;
  } else {
    recipes.push({ id: Date.now(), name, category, time, image, imageData, ingredients, steps, tags, rating: 0, notes: '' });
  }
  saveToLS();
  closeModal('form-modal');
  render();
}

// ============= DETAIL =============
function viewRecipe(id) {
  viewingId = id;
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  const el = document.getElementById('recipe-detail');
  el.innerHTML = `
    ${r.image || r.imageData
      ? `<img class="detail-img" src="${r.imageData || r.image}" onerror="this.src='';this.onerror=null">`
      : `<div class="detail-img">🍽️</div>`}
    <h2>${r.name} <span style="font-size:.9rem;color:#94a3b8;font-weight:400;">(⏱ ${r.time} min)</span></h2>
    <div class="detail-meta">
      <span>📂 ${r.category}</span>
      <span>🏷 ${r.tags.join(', ')}</span>
    </div>
    <div class="detail-section">
      <h3>Hodnotenie</h3>
      <div class="star-rating" id="star-rating">
        ${[1,2,3,4,5].map(i => `<span class="star ${i <= Math.round(r.rating) ? 'active' : ''}" data-star="${i}" onclick="setRating(${id},${i})">★</span>`).join('')}
      </div>
    </div>
    <div class="detail-section">
      <h3>Suroviny</h3>
      <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <h3>Postup</h3>
      <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    </div>
    <div class="detail-section">
      <h3>Poznámky</h3>
      <textarea id="recipe-notes" style="width:100%;padding:.5rem;border:1px solid #d1d5db;border-radius:8px;min-height:60px;font-family:inherit;font-size:.88rem;" onchange="saveNotes(${id},this.value)">${r.notes || ''}</textarea>
    </div>
  `;
  openModal('detail-modal');
}

function setRating(id, val) {
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  r.rating = r.rating === val ? 0 : val;
  saveToLS();
  viewRecipe(id);
  render();
}

function saveNotes(id, val) {
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  r.notes = val;
  saveToLS();
}

function editCurrent() {
  const r = recipes.find(rec => rec.id === viewingId);
  if (!r) return;
  closeModal('detail-modal');
  openFormModal(r);
}

function deleteCurrent() {
  if (!confirm('Naozaj chcete zmazať tento recept?')) return;
  recipes = recipes.filter(r => r.id !== viewingId);
  Object.keys(mealPlan).forEach(k => {
    Object.keys(mealPlan[k]).forEach(m => {
      if (mealPlan[k][m] === viewingId) delete mealPlan[k][m];
    });
  });
  saveToLS();
  closeModal('detail-modal');
  render();
  renderPlanner();
}

// ============= SHARE =============
function shareRecipe() {
  const r = recipes.find(rec => rec.id === viewingId);
  if (!r) return;
  const text = `🍽️ ${r.name}\n⏱ ${r.time} min | 📂 ${r.category}\n\nSuroviny:\n${r.ingredients.map(i => `• ${i}`).join('\n')}\n\nPostup:\n${r.steps.map((s,j) => `${j+1}. ${s}`).join('\n')}\n\n🏷 ${r.tags.join(', ')}`;
  navigator.clipboard.writeText(text).then(() => {
    alert('Recept skopírovaný do schránky!');
  }).catch(() => {
    prompt('Skopírujte text:', text);
  });
}

// ============= EXPORT / IMPORT =============
function exportRecipes() {
  const blob = new Blob([JSON.stringify(recipes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `receptar-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importRecipes(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data) || !data.length || !data[0].name) throw new Error('neplatný formát');
      if (confirm(`Naozaj chcete importovať ${data.length} receptov? Existujúce recepty ostanú zachované (v prípade rovnakého ID sa prepíšu).`)) {
        data.forEach(imp => {
          const idx = recipes.findIndex(r => r.id === imp.id);
          if (idx !== -1) recipes[idx] = imp;
          else recipes.push(imp);
        });
        saveToLS();
        render();
        renderPlanner();
        renderShopRecipes();
        alert(`Importovaných ${data.length} receptov.`);
      }
    } catch(err) {
      alert('Neplatný súbor. Vyber JSON exportovaný z Receptára.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============= COOKING MODE =============
function openCookingMode() {
  cookingRecipeId = viewingId;
  cookingStep = 0;
  const r = recipes.find(rec => rec.id === cookingRecipeId);
  if (!r) return;
  closeModal('detail-modal');
  document.getElementById('cooking-mode').classList.add('active');
  renderCookingStep();
}

function renderCookingStep() {
  const r = recipes.find(rec => rec.id === cookingRecipeId);
  if (!r) return;
  const total = r.steps.length;
  document.getElementById('cooking-title').textContent = r.name;
  const imgEl = document.getElementById('cooking-img');
  if (r.image || r.imageData) {
    imgEl.innerHTML = `<img src="${r.imageData || r.image}" style="width:100%;height:100%;object-fit:contain;" onerror="this.outerHTML='🍽️'">`;
  } else {
    imgEl.textContent = '🍽️';
  }
  document.getElementById('cooking-step-indicator').textContent = `Krok ${cookingStep + 1} z ${total}`;
  document.getElementById('cooking-step-text').textContent = r.steps[cookingStep];
  document.getElementById('cooking-step-count').textContent = `${cookingStep + 1} / ${total}`;
  document.getElementById('cooking-progress-bar').style.width = `${((cookingStep + 1) / total) * 100}%`;
  document.getElementById('cooking-prev').disabled = cookingStep === 0;
  document.getElementById('cooking-next').textContent = cookingStep === total - 1 ? '✓ Hotovo' : 'Ďalší →';
}

function cookingNext() {
  const r = recipes.find(rec => rec.id === cookingRecipeId);
  if (!r) return;
  if (cookingStep < r.steps.length - 1) { cookingStep++; renderCookingStep(); }
  else { closeCookingMode(); alert('🎉 Hotovo! Dobrú chuť!'); }
}

function cookingPrev() {
  if (cookingStep > 0) { cookingStep--; renderCookingStep(); }
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('cooking-mode').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); cookingNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); cookingPrev(); }
  if (e.key === 'Escape') { closeCookingMode(); }
});

function closeCookingMode() {
  document.getElementById('cooking-mode').classList.remove('active');
}

// ============= PLANNER =============
const DAYS = ['Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota','Nedeľa'];
const MEALS = ['Raňajky','Obed','Večera'];

function renderPlanner() {
  const grid = document.getElementById('planner-grid');
  let html = `<div class="planner-header">Deň</div>${MEALS.map(m => `<div class="planner-header">${m}</div>`).join('')}`;
  DAYS.forEach(day => {
    html += `<div class="planner-day-label">${day}</div>`;
    MEALS.forEach(meal => {
      const key = `${day}-${meal}`;
      const rid = mealPlan[key];
      const r = rid ? recipes.find(rec => rec.id === rid) : null;
      html += `<div class="planner-day" onclick="openPlannerPick('${day}','${meal}')">`;
      if (r) {
        html += `<div class="planner-recipe" title="${r.name}">${r.name}</div>`;
      } else {
        html += `<span class="planner-empty">+ pridať</span>`;
      }
      html += `</div>`;
    });
  });
  grid.innerHTML = html;
}

function openPlannerPick(day, meal) {
  plannerPickDay = day;
  plannerPickMeal = meal;
  const key = `${day}-${meal}`;
  const rid = mealPlan[key];
  document.getElementById('planner-pick-title').textContent = `${day} – ${meal}`;
  document.getElementById('planner-pick-search').value = '';
  const rmBtn = document.getElementById('planner-remove-btn');
  rmBtn.style.display = rid ? 'inline-flex' : 'none';
  renderPlannerPick();
  openModal('planner-pick-modal');
}

function renderPlannerPick() {
  const search = document.getElementById('planner-pick-search').value.toLowerCase();
  const list = document.getElementById('planner-pick-list');
  const filtered = recipes.filter(r => r.name.toLowerCase().includes(search));
  if (!filtered.length) { list.innerHTML = '<p style="color:#94a3b8;">Žiadne recepty.</p>'; return; }
  list.innerHTML = filtered.map(r => `
    <div style="padding:.5rem;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:.5rem;${r.name.toLowerCase().includes(search) ? '' : ''}"
         onmouseenter="this.style.background='#f1f5f9'" onmouseleave="this.style.background=''"
         onclick="plannerSelect(${r.id})">
      ${r.image || r.imageData ? `<img src="${r.imageData || r.image}" style="width:40px;height:30px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'">` : '<span style="font-size:1.3rem;">🍽️</span>'}
      <span>${r.name}</span>
    </div>
  `).join('');
}

function plannerSelect(id) {
  const key = `${plannerPickDay}-${plannerPickMeal}`;
  mealPlan[key] = id;
  saveToLS();
  closeModal('planner-pick-modal');
  renderPlanner();
}

function plannerRemove() {
  const key = `${plannerPickDay}-${plannerPickMeal}`;
  delete mealPlan[key];
  saveToLS();
  closeModal('planner-pick-modal');
  renderPlanner();
}

function clearPlanner() {
  if (!confirm('Vyčistiť celý plánovač?')) return;
  mealPlan = {};
  saveToLS();
  renderPlanner();
}

// ============= SHOPPING LIST =============
function renderShopRecipes() {
  const el = document.getElementById('shop-recipe-select');
  el.innerHTML = recipes.map(r => `
    <span class="shop-recipe-tag ${shopChecked.has(r.id) ? 'selected' : ''}" onclick="toggleShopRecipe(${r.id})">
      ${r.name}
    </span>
  `).join('');
}

function toggleShopRecipe(id) {
  if (shopChecked.has(id)) shopChecked.delete(id);
  else shopChecked.add(id);
  renderShopRecipes();
  generateShoppingList();
}

function generateShoppingFromPlanner() {
  const ids = new Set(Object.values(mealPlan).filter(Boolean));
  if (!ids.size) return alert('Plánovač je prázdny. Najprv naplánuj jedlá.');
  shopChecked = ids;
  switchTab('shopping');
  renderShopRecipes();
  generateShoppingList();
}

function generateShoppingList() {
  const el = document.getElementById('shop-list');
  const all = [];
  shopChecked.forEach(id => {
    const r = recipes.find(rec => rec.id === id);
    if (r) r.ingredients.forEach(i => all.push(i));
  });
  if (!all.length) { el.innerHTML = '<li style="color:#94a3b8;padding:1rem;">Vyber aspoň jeden recept.</li>'; return; }
  // Group ingredients: count duplicates
  const counts = {};
  all.forEach(i => {
    const key = i.toLowerCase().replace(/^\d+[gml]+\s*/,'').trim();
    counts[key] = counts[key] || { text: i, count: 0 };
    counts[key].count++;
  });
  el.innerHTML = Object.values(counts).map(c => `
    <li><input type="checkbox"><span>${c.text}${c.count > 1 ? ` <span style="color:#94a3b8;font-size:.8rem;">(×${c.count})</span>` : ''}</span></li>
  `).join('');
  // restore checked state from session
  el.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() {
      this.closest('li').classList.toggle('checked', this.checked);
    });
  });
}

function clearShoppingChecks() {
  shopChecked.clear();
  renderShopRecipes();
  document.getElementById('shop-list').innerHTML = '<li style="color:#94a3b8;padding:1rem;">Vyber aspoň jeden recept.</li>';
}

// ============= TABS =============
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
  if (name === 'planner') renderPlanner();
  if (name === 'shopping') { renderShopRecipes(); generateShoppingList(); }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ============= INIT =============
render();
renderPlanner();
</script>
